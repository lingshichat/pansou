name: Sync Upstream

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream
        run: |
          git remote add upstream https://github.com/fish2018/pansou.git
          git fetch upstream main
          git merge upstream/main --allow-unrelated-histories -m "chore: sync upstream"
          git push origin main
